name: Backend CI                                                                                      
    
on:      
  push:
    paths:
    - "backend/**"
    - ".github/workflows/backend.yml"
  pull_request:
    paths:
    - "backend/**"
    - ".github/workflows/backend.yml"                      

permissions:
  contents: read                        

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true                                                                            
                                              
jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: korean_learning_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/korean_learning_test
      RAILS_ENV: test
      SECRET_KEY_BASE: dummy_secret_key_base_for_ci
      JWT_SECRET_KEY: dummy_jwt_secret_key_for_ci
      DISABLE_SPRING: 1

    steps:
      - uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3.11"
          bundler-cache: true
          working-directory: backend

      - name: Set up database
        run: bundle exec rails db:schema:load

      - name: Run tests
        run: bundle exec rspec

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3.11"
          bundler-cache: true
          working-directory: backend

      - name: Rubocop
        run: bundle exec rubocop

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3.11"
          bundler-cache: true
          working-directory: backend

      - name: Brakeman
        run: bundle exec brakeman --no-pager

      - name: bundler-audit
        run: bundle exec bundler-audit check --update